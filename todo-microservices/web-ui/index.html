<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo Manager - Event Driven</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .task-item:hover {
            transform: translateX(5px);
            background: #e9ecef;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .task-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-NEW {
            background: #ffc107;
            color: #856404;
        }

        .task-id {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
            font-family: monospace;
        }

        .delete-btn {
            background: #dc3545;
            padding: 8px 16px;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: #28a745;
            color: white;
            margin-left: 10px;
        }

        .loading {
            text-align: center;
            color: #6c757d;
            padding: 20px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: space-around;
            margin-top: 20px;
        }

        .stat-card {
            text-align: center;
            flex: 1;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Event-Driven ToDo Manager</h1>

        <div class="card">
            <h2>➕ Создать новую задачу</h2>
            <div class="input-group">
                <input type="text" id="taskTitle" placeholder="Введите название задачи..." onkeypress="handleKeyPress(event)">
                <button onclick="createTask()">Создать задачу</button>
            </div>
        </div>

        <div class="card">
            <h2>📝 Список задач</h2>
            <div id="tasksContainer">
                <div class="loading">Загрузка задач...</div>
            </div>
            <div class="stats" id="stats" style="display: none;">
                <div class="stat-card">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Всего задач</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="newTasks">0</div>
                    <div class="stat-label">Новых</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📡 Системный статус</h2>
            <div id="systemStatus">
                <div class="loading">Проверка подключения...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001';
        let autoRefreshInterval = null;

        async function checkSystemStatus() {
            try {
                const response = await fetch(`${API_BASE}/tasks`);
                if (response.ok) {
                    document.getElementById('systemStatus').innerHTML = `
                        <div style="color: #28a745; padding: 10px; background: #d4edda; border-radius: 8px;">
                            ✅ Все системы работают нормально
                        </div>
                    `;
                } else {
                    throw new Error('API не отвечает');
                }
            } catch (error) {
                document.getElementById('systemStatus').innerHTML = `
                    <div style="color: #721c24; padding: 10px; background: #f8d7da; border-radius: 8px;">
                        ⚠️ Ошибка подключения к серверу: ${error.message}
                    </div>
                `;
            }
        }

        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks`);
                if (!response.ok) throw new Error('Ошибка загрузки задач');

                const tasks = await response.json();
                displayTasks(tasks);
                updateStats(tasks);
            } catch (error) {
                document.getElementById('tasksContainer').innerHTML = `
                    <div class="error">❌ Ошибка загрузки задач: ${error.message}</div>
                `;
            }
        }

        function displayTasks(tasks) {
            if (tasks.length === 0) {
                document.getElementById('tasksContainer').innerHTML = `
                    <div style="text-align: center; color: #6c757d; padding: 40px;">
                        🎉 Нет задач! Создайте первую задачу выше.
                    </div>
                `;
                return;
            }

            const tasksHtml = `
                <ul class="task-list">
                    ${tasks.map(task => `
                        <li class="task-item">
                            <div class="task-info">
                                <div class="task-title">
                                    ${escapeHtml(task.title)}
                                    <span class="task-status status-${task.status}">${task.status}</span>
                                </div>
                                <div class="task-id">ID: ${task.id}</div>
                            </div>
                            <button class="delete-btn" onclick="deleteTask('${task.id}')">🗑️ Удалить</button>
                        </li>
                    `).join('')}
                </ul>
            `;
            document.getElementById('tasksContainer').innerHTML = tasksHtml;
        }

        function updateStats(tasks) {
            const total = tasks.length;
            const newTasks = tasks.filter(t => t.status === 'NEW').length;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('newTasks').textContent = newTasks;
            document.getElementById('stats').style.display = 'flex';
        }

        async function createTask() {
            const titleInput = document.getElementById('taskTitle');
            const title = titleInput.value.trim();

            if (!title) {
                alert('Пожалуйста, введите название задачи');
                return;
            }

            const createBtn = event.target;
            createBtn.disabled = true;
            createBtn.textContent = 'Создание...';

            try {
                const response = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ title: title })
                });

                if (!response.ok) {
                    if (response.status === 429) {
                        throw new Error('Слишком много запросов! Подождите секунду.');
                    }
                    throw new Error('Ошибка создания задачи');
                }

                const task = await response.json();
                console.log('Задача создана:', task);

                // Очищаем поле ввода
                titleInput.value = '';

                // Перезагружаем список задач
                await loadTasks();

                // Показываем уведомление
                showNotification('✅ Задача успешно создана!');

            } catch (error) {
                alert(`Ошибка: ${error.message}`);
            } finally {
                createBtn.disabled = false;
                createBtn.textContent = 'Создать задачу';
            }
        }

        async function deleteTask(taskId) {
            if (!confirm('Вы уверены, что хотите удалить эту задачу?')) return;

            try {
                const response = await fetch(`${API_BASE}/tasks/${taskId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Ошибка удаления задачи');

                showNotification('🗑️ Задача удалена');
                await loadTasks();
            } catch (error) {
                alert(`Ошибка: ${error.message}`);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                createTask();
            }
        }

        function showNotification(message) {
            // Создаём временное уведомление
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Автообновление каждые 5 секунд
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(loadTasks, 5000);
        }

        // Инициализация
        async function init() {
            await checkSystemStatus();
            await loadTasks();
            startAutoRefresh();
        }

        // Запускаем приложение
        init();
    </script>
</body>
</html>
