#    ports:
#      - "80:80"
#      - "8080:8080"
#    volumes:
#      - "//./pipe/docker_engine://./pipe/docker_engine"
#    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: eventuser
      MONGO_INITDB_ROOT_PASSWORD: eventpass
      MONGO_INITDB_DATABASE: eventdb
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  task-service-1:
    build: ./todo-microservices/task-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.task1.rule=PathPrefix(`/tasks`)"
      - "traefik.http.routers.task1.middlewares=rate-limit@file"
      - "traefik.http.services.task1.loadbalancer.server.port=8001"
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      - postgres
      - redis
#      - traefik

  task-service-2:
    build: ./todo-microservices/task-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.task2.rule=PathPrefix(`/tasks`)"
      - "traefik.http.routers.task2.middlewares=rate-limit@file"
      - "traefik.http.services.task2.loadbalancer.server.port=8001"
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      - postgres
      - redis
#      - traefik

  event-service:
    build: ./todo-microservices/event-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.event.rule=PathPrefix(`/event`)"
      - "traefik.http.routers.event.middlewares=rate-limit@file"
      - "traefik.http.services.event.loadbalancer.server.port=8002"
    environment:
      - MONGO_HOST=mongodb
      - KAFKA_HOST=kafka
    depends_on:
      - mongodb
      - kafka
#      - traefik

  # notification-service
  notification-service:
    build: ./todo-microservices/notification-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notification.rule=PathPrefix(`/notify`)"
      - "traefik.http.services.notification.loadbalancer.server.port=8003"
    depends_on:
      - kafka
#      - traefik

volumes:
  postgres_data:
  mongo_data:
  redis_data: