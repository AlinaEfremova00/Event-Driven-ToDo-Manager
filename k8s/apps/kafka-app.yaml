apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: kafka-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: git@github.com:AlinaEfremova00/Event-Driven-ToDo-Manager.git
    targetRevision: main
    path: k8s/kafka

  destination:
    server: https://kubernetes.default.svc
    namespace: kafka

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
