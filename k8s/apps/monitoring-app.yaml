apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/AlinaEfremova00/Event-Driven-ToDo-Manager.git
    targetRevision: main
    path: k8s/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true