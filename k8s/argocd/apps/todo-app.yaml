apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: todo-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: git@github.com:AlinaEfremova00/Event-Driven-ToDo-Manager.git
    targetRevision: main
    path: k8s/manifests/todo-app

  destination:
    server: https://kubernetes.default.svc
    namespace: todo-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true