# k8s/argocd/apps/todo-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/AlinaEfremova00/Event-Driven-ToDo-Manager.git
    targetRevision: main
    path: k8s/apps/todo

  destination:
    server: https://kubernetes.default.svc
    namespace: todo-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  env:
    - name: TEST_MODE
      value: "true"